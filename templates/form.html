<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نموذج تسجيل الطلبة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;700&display=swap" rel="stylesheet">
<style>
/* =========================== */
/* الخلفية للجسم */
body {
    display: flex;
    height: 100vh;
    margin: 0;
    background: #f0f0f0;
}
.image-side{
    flex:1;
    background: url('/static/images/background.jpg') no-repeat center center;
    background-size: contain;
    background-color:#e3f2fd;
}


 .image-side{
    flex:1;
    background: url('/static/images/background.jpg') no-repeat center center;
    background-size: contain;
    background-color:#e3f2fd;
}


/* =========================== */
/* صندوق النموذج */
.container { 
    flex: 1;              /* يجعل النافذة تتمدد */
    max-width: none;      /* يزيل الحد الأقصى للعرض */
    width: 100%;
    min-height: 90vh;
    background: rgba(25,118,210,0.9);
    padding: 40px;
    border-radius: 12px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* =========================== */
/* عنوان النموذج */
h2 { 
    text-align: center; 
    margin-bottom: 30px; 
    font-size: 48px; /* تكبير العنوان */
    color: #ffd700; /* لون ذهبي جميل */
    font-weight: bold;
    letter-spacing: 2px;
    font-family: 'El Messiri', sans-serif; /* الخط الجديد للعنوان */      
    text-shadow: 
        0 0 10px rgba(255,255,255,0.7),
        0 0 20px rgba(255,215,0,0.8),
        2px 2px 5px rgba(0,0,0,0.5);
}

/* =========================== */
/* الحقول */
input, select { 
    width: 100%; 
    padding: 14px; /* تكبير الحقول */
    margin: 10px 0; 
    border-radius: 8px; 
    border: 1px solid #90caf9; 
    font-size: 18px; /* تكبير الكتابة */
    background: #f9f9f9; 
    color: #000;
}
input:focus, select:focus {
    border-color: #42a5f5;
    outline: none;
}

/* =========================== */
/* الأزرار */
.buttons { 
    display: flex; 
    gap: 15px; 
    margin-top: 20px; 
}
.buttons button { 
    flex: 1; 
    padding: 14px; /* تكبير الأزرار */
    border: none; 
    border-radius: 8px; 
    font-size: 18px; /* تكبير الكتابة */
    cursor: pointer; 
    font-weight: bold; 
    transition: 0.3s;
}
#submitBtn { 
    background: #4caf50; 
    color: white; 
}
#submitBtn:hover { 
    background: #388e3c; 
}
#cancelBtn { 
    background: #bdbdbd; 
    color: #212121; 
}
#cancelBtn:hover { 
    background: #616161; 
}

/* --- نافذة التحذير --- */
#arabicModal {
    display: none;
    position: fixed;
    top: 0; left: 0; right:0; bottom:0;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
#arabicModal .modal-content {
    background: #ffeb3b; 
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    font-size: 18px;
    font-weight: bold;
}
#arabicModal .modal-content button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}
#arabicModal .modal-content button#closeModal {
    background: #f44336; 
    color: white;
}
#arabicModal .modal-content button#closeModal:hover {
    background: #d32f2f;
}
</style>
</head>
<body>
<div class="image-side"></div>
 <div class="container">
    <h2>نموذج تسجيل الطلبة</h2>
    <form method="POST" action="/" id="studentForm">
        <input type="text" name="last_name" placeholder="اللقب" required>
        <input type="text" name="first_name" placeholder="الاسم الشخصي" required>

        <!-- القسم -->
        <select name="class" required>
            <option value="">اختر القسم</option>
            <option value="أولى علوم1">أولى علوم1</option>
            <option value="أولى علوم2">أولى علوم2</option>
            <option value="أولى علوم3">أولى علوم3</option>
            <option value="أولى علوم4">أولى علوم4</option>
            <option value="أولى علوم5">أولى علوم5</option>
            <option value="أولى علوم6">أولى علوم6</option>
            <option value="أولى علوم7">أولى علوم7</option>
        </select>

        <!-- الفوج -->
        <select name="group" required>
            <option value="">اختر الفوج</option>
            <option value="الفوج1">الفوج1</option>
            <option value="الفوج2">الفوج2</option>
        </select>

        <!-- حقل الملاحظة مرتبط بالعمود observation -->
        <input type="text" name="note" placeholder="ملاحظة">

        <div class="buttons">
            <button type="submit" id="submitBtn">إرسال</button>
            <button type="button" id="cancelBtn" onclick="window.location.href='/'">إلغاء / خروج</button>
        </div>
    </form>
</div>

<!-- نافذة الكتابة بالعربية -->
<div id="arabicModal">
    <div class="modal-content">
        الرجاء كتابة المعلومات بالعربية فقط! ❌
        <br>
        <button id="closeModal" onclick="closeArabicModal()">إغلاق</button>
    </div>
</div>

<script>
// التحقق من أن الحقول مكتوبة بالعربية
function isArabic(text) {
    return /^[\u0600-\u06FF\s]+$/.test(text);
}

document.getElementById("studentForm").addEventListener("submit", function(e){
    const lastName = this.last_name.value.trim();
    const firstName = this.first_name.value.trim();
    const note = this.note.value.trim();

    if(!isArabic(lastName) || !isArabic(firstName) || (note && !isArabic(note))) {
        e.preventDefault(); 
        document.getElementById("arabicModal").style.display = "flex";
    }
});

function closeArabicModal() {
    document.getElementById("arabicModal").style.display = "none";
}
</script>

</body>
</html>
